<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>75% Attendance Calculator</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" href="favicon/apple-touch-icon.png">
<link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<h1 class="title">75% Attendance Calculator</h1>

<p class="description">
Find out the number of classes you can bunk while still maintaining
75% attendance or the number of classes you must attend to reach 75%.
</p>

<div class="container">

<select id="percent">
<option value="75">75% Required Attendance</option>
<option value="80">80% Required Attendance</option>
<option value="85">85% Required Attendance</option>
</select>

<input type="number" id="present" placeholder="Classes Attended">

<input type="number" id="total" placeholder="Total Classes">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

</div>

<div class="social-links">

<p class="connect">Connect with me</p>

<a href="https://github.com/OmChuri" target="_blank">
<i class="fa-brands fa-github"></i>
</a>

<a href="https://www.linkedin.com/in/om-churi/" target="_blank">
<i class="fa-brands fa-linkedin"></i>
</a>

</div>

<script src="script.js"></script>

</body>

</html>
